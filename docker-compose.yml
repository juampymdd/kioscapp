services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       kioscapp
      POSTGRES_USER:     kioscapp
      POSTGRES_PASSWORD: kioscapp_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kioscapp -d kioscapp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
